name: Fetch Chebul
 
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
 
permissions:
  contents: write
 
jobs:
  fetch:
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium
 
      - name: Fetch chebul
        run: python fetch_chebul.py
 
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add Result/chebul/chebul.json
          git diff --staged --quiet || git commit -m "Update chebul $(date +'%Y-%m-%d %H:%M')"
          git push
 
